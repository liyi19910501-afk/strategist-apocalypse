<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>策略人启示录</title>
  <!-- 百度统计 -->

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100vh;
      background: #050810;
      color: #cbd5e1;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      user-select: none;
      padding: 16px;
    }

    #wrap {
      position: relative;
      width: 960px;
      height: 540px;
      max-width: 100vw;
      background: #000;
      border: 4px solid #1e293b;
      box-shadow: 0 0 60px rgba(56, 182, 219, 0.18);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 6px 100%;
      opacity: 0.18;
      z-index: 10;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.6) 100%);
      z-index: 9;
    }

    #muteBtn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 25;
      background: rgba(13, 14, 26, 0.7);
      color: #38b6db;
      border: 2px solid #38b6db;
      font-family: monospace;
      font-weight: 700;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: all 0.1s;
    }

    #muteBtn:hover {
      background: #38b6db;
      color: #000;
    }

    #backBtn {
      position: absolute;
      top: 40px;
      right: 12px;
      left: auto;
      z-index: 25;
      background: rgba(13, 14, 26, 0.7);
      color: #cbd5e1;
      border: 2px solid #475569;
      font-family: monospace;
      font-weight: 700;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 0.1em;
      display: none;
    }

    #backBtn:hover {
      background: #475569;
      color: #fff;
    }

    #pauseBtn {
      position: absolute;
      top: 68px;
      right: 12px;
      z-index: 25;
      background: rgba(13, 14, 26, 0.7);
      color: #ffec27;
      border: 2px solid #ffec27;
      font-family: monospace;
      font-weight: 700;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 0.1em;
      display: none;
      transition: all 0.1s;
    }
    #pauseBtn:hover {
      background: #ffec27;
      color: #000;
    }

    .game-buttons {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      display: none;
      gap: 14px;
      z-index: 22;
    }

    .game-buttons.show {
      display: flex;
    }

    .game-btn {
      font-family: -apple-system, "PingFang SC", monospace;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 0.05em;
      padding: 11px 22px;
      border: none;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s;
      user-select: none;
      image-rendering: pixelated;
      position: relative;
    }

    .game-btn.primary {
      background: #ffec27;
      color: #050810;
      box-shadow: 0 4px 0 #b13e53, 0 0 22px rgba(255, 236, 39, 0.3);
    }

    .game-btn.primary:hover {
      background: #fff;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #b13e53, 0 0 30px rgba(255, 236, 39, 0.5);
    }

    .game-btn.primary:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #b13e53;
    }

    .game-btn.secondary {
      background: rgba(13, 14, 26, 0.85);
      color: #cbd5e1;
      border: 2px solid #475569;
    }

    .game-btn.secondary:hover {
      border-color: #38b6db;
      color: #38b6db;
    }

    #winButtons .game-btn {
      color: #ffcc00;
      animation: blink 1.5s infinite;
    }

    #finaleButtons {
      position: absolute;
      bottom: 24px;
      right: 24px;
      left: auto;
      transform: none;
      flex-direction: column;
      gap: 16px;
    }

    #shareToast {
      position: absolute;
      left: 50%;
      bottom: 96px;
      transform: translateX(-50%);
      background: rgba(56, 182, 219, 0.95);
      color: #050810;
      font-family: monospace;
      font-weight: 700;
      font-size: 13px;
      padding: 8px 18px;
      z-index: 30;
      display: none;
      letter-spacing: 0.05em;
      box-shadow: 0 0 20px rgba(56, 182, 219, 0.6);
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translate(-50%, 10px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    #footer {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      width: 968px;
      max-width: 100vw;
      font-size: 11px;
      color: #475569;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #footer .ctrl-row {
      width: 100%;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
      background: rgba(56, 182, 219, 0.10);
      border: 2px solid rgba(56, 182, 219, 0.45);
      padding: 8px 24px;
      font-size: 16px;
      color: #cbd5e1;
      letter-spacing: 0.05em;
      font-family: monospace;
      font-weight: 700;
      text-transform: none;
    }

    #footer .ctrl-row .key {
      display: inline-block;
      background: #1e293b;
      border: 2px solid #38b6db;
      color: #38b6db;
      padding: 2px 9px;
      margin: 0 5px;
      font-size: 15px;
      border-radius: 2px;
    }

    #footer .meta-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #footer .accent {
      color: #38b6db;
    }

    /* v0.8 移动端触屏控制 —— 桌面默认隐藏 */
    #touchControls { display: none; }
    .touch-pad-left, .touch-pad-right {
      position: absolute; bottom: 8px;
      display: flex; gap: 8px;
      z-index: 28;
    }
    .touch-pad-left { left: 8px; }
    .touch-pad-right { right: 8px; }
    .touch-btn {
      width: 56px; height: 56px;
      border: 2px solid rgba(56, 182, 219, 0.7);
      background: rgba(13, 14, 26, 0.65);
      color: #38b6db;
      font-family: monospace; font-weight: 800;
      font-size: 18px; cursor: pointer;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .touch-btn:active {
      background: rgba(56, 182, 219, 0.6);
      color: #050810;
    }
    .touch-btn.jump { border-color: rgba(255, 236, 39, 0.8); color: #ffec27; font-size: 13px; }
    .touch-btn.act { border-color: rgba(255, 100, 100, 0.7); color: #ff6464; }
    .touch-btn.enter { border-color: rgba(255, 184, 0, 0.9); color: #ffb800; font-size: 14px; }

    /* 触屏设备 / 窄屏自动显示 */
    @media (hover: none) and (pointer: coarse), (max-width: 720px) {
      #touchControls { display: block; }
      #wrap { width: 100vw; max-width: 100vw; }
      body { padding: 4px; justify-content: flex-start; padding-top: 8px; }
      #footer { font-size: 9px; gap: 12px; }
    }
  </style>
</head>

<body>
  <div id="wrap">
    <canvas id="game" width="480" height="270"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <button id="muteBtn">♪ 音乐 开</button>
    <button id="backBtn">← 返回标题</button>
    <button id="pauseBtn">⏸ 按 P 暂停</button>

    <div class="game-buttons" id="winButtons">
      <button class="game-btn secondary" id="btnNext">▶ 下一章</button>
      <button class="game-btn secondary" id="btnRestart">↻ 重新挑战</button>
    </div>
    <div class="game-buttons" id="loseButtons">
      <button class="game-btn primary" id="btnLoseRestart">↻ 重新挑战</button>
      <button class="game-btn secondary" id="btnLoseSelect">← 返回标题</button>
    </div>
    <div class="game-buttons" id="finaleButtons">
      <button class="game-btn secondary" id="btnFinaleRestart">↻ 重新开始游戏</button>
      <button class="game-btn primary" id="btnContact">✉ 联系作者</button>
    </div>

      if (audioCtx) {

      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();

        masterGain.connect(audioCtx.destination);

    function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }
    function playTone(time, freq, duration, type = 'square', vol = 0.04) {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, time);
      g.gain.setValueAtTime(0, time);
      g.gain.linearRampToValueAtTime(vol, time + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0008, time + duration);
      o.connect(g); g.connect(masterGain);
      o.start(time); o.stop(time + duration + 0.02);
    }
    function playDrum(time, type) {
      if (!audioCtx) return;
      if (type === 1) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(150, time);
        o.frequency.exponentialRampToValueAtTime(38, time + 0.1);
        g.gain.setValueAtTime(0.18, time);
        g.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
        o.connect(g); g.connect(masterGain);
        o.start(time); o.stop(time + 0.16);
      } else if (type === 2) {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const n = audioCtx.createBufferSource(); n.buffer = buf;
        const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 7000;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.04, time);
        g.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
        n.connect(f); f.connect(g); g.connect(masterGain);
        n.start(time); n.stop(time + 0.06);
      } else if (type === 3) {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const n = audioCtx.createBufferSource(); n.buffer = buf;
        const f = audioCtx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1500;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.08, time);
        g.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
        n.connect(f); f.connect(g); g.connect(masterGain);
        n.start(time); n.stop(time + 0.11);
      }
    }

      bgmCurrentId = trackId;
      bgmStepTime = 60 / bgmTrack.bpm / 4;
      bgmRunning = true;

      bgmNextTime = audioCtx.currentTime + 0.08;
      bgmScheduler();

      bgmRunning = false;
      bgmCurrentId = null;
      if (bgmTimerId) clearTimeout(bgmTimerId);

    function bgmScheduler() {
      if (!bgmRunning) return;
      const lookAhead = 0.15;
      while (bgmNextTime < audioCtx.currentTime + lookAhead) {
        const step = bgmStep % 64;
        const bn = bgmTrack.bass[step];
        if (bn > 0) playTone(bgmNextTime, midiToFreq(bn), bgmStepTime * 3.6, 'triangle', 0.085);
        const ln = bgmTrack.lead[step];
        if (ln > 0) {
          const leadType = (bgmCurrentId === 'ch3' || bgmCurrentId === 'finale') ? 'sawtooth' : 'square';
          const vol = (bgmCurrentId === 'ch3' || bgmCurrentId === 'finale') ? 0.022 : 0.028;
          playTone(bgmNextTime, midiToFreq(ln), bgmStepTime * 1.6, leadType, vol);
        }
        const dt = bgmTrack.drums[step];
        if (dt > 0) playDrum(bgmNextTime, dt);
        bgmNextTime += bgmStepTime;
        bgmStep++;
      }
      bgmTimerId = setTimeout(bgmScheduler, 25);

      const x = px(b.x + wobX);

          ctx.globalAlpha = 1;

        // 桌子

        rect(sx - 28, sy + 43, 56, 1, humanAlive ? col : '#ef4444');

          rect(sx - 8, sy + 34, 7, 1, C.dim);

        if (humanAlive) {
          rect(sx - 3, sy + 11, 7, 6, C.skin);   // 头
          rect(sx - 3, sy + 9,  7, 3, C.hair);   // 头发
          rect(sx - 5, sy + 17, 10, 7, '#e2e8f0'); // 身体
          rect(sx - 11, sy + 20, 6, 3, C.skin);  // 左臂

    function drawBackgroundCh3() {
      // 数字虚空
      const g = ctx.createLinearGradient(0, 0, 0, H);

    function drawBossCh3() {

      else if (currentChapter === 3) drawBackgroundCh3();
      else if (currentChapter === 4) drawBackgroundCh4();

    function drawBoss() {
      if (currentChapter === 1) drawBossCh1();

    }

    // ============================================================
    //  通用：玩家物理 / 光束 / 粒子
    // ============================================================
    function updatePlayer() {
      const p = player;
      let move = 0;
      if (keys['arrowleft'] || keys['a']) move -= 1;
      if (keys['arrowright'] || keys['d']) move += 1;
      p.vx = move * 2;
      if (move !== 0) p.facing = move;
      // v1.4: 空格不再跳跃（改为发射键）。跳跃只剩 ↑ / W
      if ((keys['arrowup'] || keys['w']) && !p.jumping) {
        p.vy = -7; p.jumping = true;
        beep(440, 0.05, 'square', 0.04);
      }
      p.vy += 0.25;
      p.x += p.vx; p.y += p.vy;
      if (p.y >= GROUND_Y) { p.y = GROUND_Y; p.vy = 0; p.jumping = false; }
      if (p.x < 15) p.x = 15;
      if (p.x > W - 15) p.x = W - 15;
      if (Math.abs(p.vx) > 0.1 && !p.jumping) p.walkPhase += 0.4;
      if (p.iframes > 0) p.iframes--;
    }

    function updateBeams() {
      for (let i = beams.length - 1; i >= 0; i--) {
        const b = beams[i];
        b.x += b.vx;
        b.life--;
        if (boss.alive && b.x > boss.x - 30 && b.x < boss.x + 30
          && Math.abs(b.y - (boss.y - 14)) < 35) {
          boss.hp -= b.dmg;
          boss.hitFlash = 8;
          shake(4);
          const hitColor = b.color || C.cyan;
          spawnParticles(boss.x, boss.y - 14, hitColor, 14);
          spawnFloat(boss.x + 12, boss.y - 30, `-${b.dmg}`, hitColor);
          beep(660, 0.1, 'square', 0.05);
          // ch2 反问命中加品牌
          if (currentChapter === 2 && b.brandBuff) {
            brandEquity = Math.min(100, brandEquity + b.brandBuff);
            spawnFloat(boss.x - 12, boss.y - 30, `+${b.brandBuff} 品牌`, C.brandCyan);
          }
          beams.splice(i, 1);
          if (boss.hp <= 0) onBossDefeated();
          continue;
        }
        if (b.life <= 0 || b.x > W + 20) beams.splice(i, 1);
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.2; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = floats.length - 1; i >= 0; i--) {
        const f = floats[i];
        f.y += f.vy; f.life--;
        if (f.life <= 0) floats.splice(i, 1);
      }
    }

    function drawBeams() {
      for (const b of beams) {
        const c = b.color || C.cyan;
        if (currentChapter === 1) {
          // v1.4: Ch1 子弹改为大色块（类似 Ch2 真洞察的清晰可读视觉）
          const blockW = 100, blockH = 16;
          const bx = b.x - blockW + 5;
          rect(bx, b.y - blockH / 2, blockW, blockH, c);
          rect(bx, b.y - blockH / 2, blockW, 2, C.white);          // 顶部高光
          rect(b.x, b.y - blockH / 2 - 2, 5, blockH + 4, C.white); // 前端尖头
          text(b.t, bx + blockW / 2, b.y + 3, C.bgDeep, 8, 'center');
        } else {
          rect(b.x - 54, b.y - 3, 54, 6, c);
          rect(b.x - 54, b.y - 1, 54, 2, C.white);
          rect(b.x, b.y - 5, 5, 10, C.white);
          text(b.t, b.x - 28, b.y + 4, c === C.cyan ? C.cyanLt : c, 11, 'center');
        }
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, Math.min(1, p.life / 30));
        rect(p.x, p.y, 2, 2, p.color);
      }
      ctx.globalAlpha = 1;
    }
    function drawFloats() {
      for (const f of floats) {
        ctx.globalAlpha = Math.max(0, f.life / 40);
        text(f.t, f.x, f.y, f.color, 9, 'center');
      }
      ctx.globalAlpha = 1;
    }

    // ============================================================
    //  CH1 战斗逻辑
    // ============================================================
    const WORD_TYPE_CONFIG = {
      fast: { fontSize: 9, padH: 6, padV: 4, life: 240, gravity: 0 },
      heavy: { fontSize: 12, padH: 8, padV: 6, life: 320, gravity: 0 },
      falling: { fontSize: 9, padH: 6, padV: 4, life: 220, gravity: 0.04 },
      dart: { fontSize: 9, padH: 5, padV: 3, life: 200, gravity: 0 },
      shout: { fontSize: 12, padH: 8, padV: 5, life: 280, gravity: 0 },
      truth: { fontSize: 12, padH: 8, padV: 5, life: 300, gravity: 0.02 },
      trap: { fontSize: 14, padH: 10, padV: 6, life: 300, gravity: 0.03 },
      ai_glitch: { fontSize: 12, padH: 8, padV: 5, life: 400, gravity: 0 },
    };

    function spawnWord(x, y, vx, vy, type = 'fast', textOverride) {
      const t = textOverride || WORD_BANK[Math.floor(Math.random() * WORD_BANK.length)];
      const cfg = WORD_TYPE_CONFIG[type];
      const w = t.length * (cfg.fontSize - 1) + cfg.padH * 2;
      const h = cfg.fontSize + cfg.padV * 2;
      words.push({
        x, y, vx, vy, t, type,
        life: cfg.life, w, h,
        fontSize: cfg.fontSize,
        gravity: cfg.gravity,
      });
    }
    function fireAimedWord(sx, sy, tx, ty, speed, type, textOverride) {
      const dx = tx - sx;
      const dy = ty - sy;
      const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
      spawnWord(sx, sy, (dx / dist) * speed, (dy / dist) * speed, type, textOverride);
    }

    function updateBossCh1() {
      const b = boss;
      if (!b.alive) { b.deathTimer++; return; }
      b.wobble += 0.04;
      b.moveTimer--;
      if (b.moveTimer <= 0) {
        b.targetX = 320 + Math.random() * 110;
        b.moveTimer = 80 + Math.random() * 60;
      }
      b.x += (b.targetX - b.x) * 0.025;
      b.y = b.baseY + Math.sin(b.wobble * 0.7) * 6;
      b.attackTimer--;
      if (b.attackTimer <= 0) {
        fireBossCh1();
        const ratio = b.hp / b.maxHp;
        // v1.4: 大幅放慢节奏，约 2.2~3.3 秒一发，给新手喘息空间
        b.attackTimer = 130 + Math.random() * 60 * ratio;
      }
      if (b.hitFlash > 0) b.hitFlash--;
    }

    function fireBossCh1() {
      // v1.4: 简化为单弹幕（不再有三连发 / 天降词条），新手友好
      const b = boss;
      const tx = player.x;
      const ty = player.y - 14;
      if (Math.random() < 0.7) {
        fireAimedWord(b.x - 24, b.y - 14, tx, ty, 1.2, 'fast');
      } else {
        fireAimedWord(b.x - 24, b.y - 18, tx, ty, 0.6, 'heavy');
      }
      beep(180, 0.15, 'sawtooth', 0.04);
    }

    function updateWords() {
      for (let i = words.length - 1; i >= 0; i--) {
        const w = words[i];
        w.x += w.vx;
        w.y += w.vy;
        if (w.gravity) w.vy += w.gravity;
        w.life--;

        // CH3 v0.8: ai_glitch 词条独立处理（不参与玩家碰撞）
        if (currentChapter === 3 && w.type === 'ai_glitch') {
          if (w.x < -30) {
            // 漏掉了：玩家受击
            if (player.iframes <= 0) {
              player.hp--;
              player.iframes = 100;
              player.totalHitsTaken++;
              parryMisses++;
              shake(5);
              beep(120, 0.2, 'sawtooth', 0.06);
              spawnFloat(40, w.y, '× 漏掉 -1 头发', C.red);
              if (player.hp <= 0) { triggerLose('hp'); return; }
            }
            words.splice(i, 1);
          } else if (w.life <= 0) {
            words.splice(i, 1);  // 防御性：寿命到自动清理
          }
          continue;
        }

        // 其他类型：正常碰撞检测
        if (player.iframes <= 0) {
          const dx = Math.abs(w.x - player.x);
          const dy = Math.abs(w.y - (player.y - 14));
          if (dx < (w.w / 2 + 6) && dy < (w.h / 2 + 12)) {
            if (currentChapter === 2 && w.type === 'truth') {
              ch2Progress++;
              spawnFloat(player.x, player.y - 32, '+1 常识', C.green);
              beep(660, 0.1, 'square', 0.05);
              words.splice(i, 1);
              if (ch2Progress >= CH2_WIN_COUNT) onBossDefeated();
              continue;
            }
            playerHit(1, currentChapter === 4 ? (w.type === 'shout' ? -10 : -4) : 0);
            spawnParticles(player.x, player.y - 14, C.red, 12);
            spawnFloat(player.x, player.y - 32, '-1 头发', C.red);
            words.splice(i, 1);
            continue;
          }
        }
        if (w.life <= 0 || w.x < -80 || w.x > W + 80 || w.y > H + 30) {
          words.splice(i, 1);
        }
      }
    }

    function fireRetort(slot) {
      if (currentChapter === 3) return; // CH3 使用格挡逻辑，不发射反问

      // v1.4: 第一关 —— 单键发射 + 多版反问文案
      if (currentChapter === 1) {
        if (retortCD[0] > 0) return;
        const CH1_RETORTS = [
          'brief 想清楚了么？',
          '批预算了么？',
          '核心用户到底是谁？',
          '到底要解决什么问题？',
        ];
        beams.push({
          x: player.x + 6, y: player.y - 16,
          // v1.4: 速度从 3 降到 1.6（boss 快弹是 1.2，玩家子弹只略快一点，保证文字看得清）
          vx: 1.6, t: CH1_RETORTS[Math.floor(Math.random() * CH1_RETORTS.length)],
          dmg: 24, life: 300,
          color: C.cyan,
        });
        retortCD[0] = 25; // 极短冷却（约 0.4 秒）
        beep(800, 0.08, 'square', 0.05);
        return;
      }

      // Ch2 / Ch4 维持原槽位发射逻辑
      if (retortCD[slot] > 0 || !retortSlots[slot]) return;
      const b = {
        x: player.x + 6, y: player.y - 16,
        vx: 3, t: retortSlots[slot],
        dmg: currentChapter === 2 ? 22 : 24, life: 180,
        color: C.cyan,
      };
      if (currentChapter === 2) b.brandBuff = 3;
      beams.push(b);
      retortCD[slot] = 160;
      beep(800, 0.08, 'square', 0.05);
      retortSlots[slot] = pickRetort();
    }

    function updateRetorts() {
      for (let i = 0; i < 3; i++) if (retortCD[i] > 0) retortCD[i]--;

      // v1.4: 第一关用空格发射
      if (currentChapter === 1) {
        if (justPressed[' ']) fireRetort(0);
        return;
      }

      // 其他章节维持 1/2/3 槽位逻辑
      if (justPressed['1']) fireRetort(0);
      if (justPressed['2']) fireRetort(1);
      if (justPressed['3']) fireRetort(2);
    }

    function drawWords() {
      for (const w of words) {
        let bg, border, txt;
        if (w.type === 'heavy') {
          bg = C.bossSk; border = C.yellow; txt = C.white;
        } else if (w.type === 'falling') {
          bg = C.gold; border = C.red; txt = C.bgDeep;
        } else if (w.type === 'shout') {
          bg = C.suitBlack; border = C.dollarGold; txt = C.dollarGold;
        } else if (w.type === 'dart') {
          bg = C.suitBlack; border = C.red; txt = C.red;
        } else if (w.type === 'truth') {
          bg = C.green; border = C.white; txt = C.bgDeep;
        } else if (w.type === 'trap') {
          bg = C.redDeep; border = C.gold; txt = C.white;
        } else if (w.type === 'ai_glitch') {
          // v0.8: 边框直接用 lane 的颜色（玩家一眼就能识别按哪个键）
          bg = C.suitBlack;
          border = w.laneColor || C.voidGlow;
          txt = C.white;
        } else {
          bg = C.redDeep; border = C.red; txt = C.white;
        }
        const x = w.x - w.w / 2, y = w.y - w.h / 2;
        rect(x - 1, y - 1, w.w + 2, w.h + 2, border);
        rect(x, y, w.w, w.h, bg);
        rect(x, y, w.w, 1, border);
        rect(x, y + w.h - 1, w.w, 1, border);
        rect(x, y, 1, w.h, border);
        rect(x + w.w - 1, y, 1, w.h, border);
        if ((w.type === 'heavy' || w.type === 'shout') && stateTimer % 20 < 10) {
          const lbl = w.type === 'shout' ? '▲ ROI 大招' : '▲ HEAVY';
          text(lbl, w.x, y - 4, C.yellow, 7, 'center');
        }
        if (w.type === 'truth') {
          text('▼ 真洞察', w.x, y - 4, C.white, 8, 'center');
        }
        text(w.t, w.x + 1, w.y + w.fontSize / 2 - 1, C.bgDeep, w.fontSize, 'center');
        text(w.t, w.x, w.y + w.fontSize / 2 - 2, txt, w.fontSize, 'center');
      }
    }

    // ============================================================
    //  通用 hit + onBossDefeated
    // ============================================================
    function playerHit(hpDmg = 1, brandDmg = 0) {
      player.hp -= hpDmg;
      // v0.7: 无敌帧 80 → 100（受击后给玩家更多喘息）
      player.iframes = 100;
      player.totalHitsTaken++;
      shake(7);
      beep(120, 0.2, 'sawtooth', 0.06);
      // v0.7: 修正 ch2/ch4 逻辑串扰 —— brand 是 CH4 的概念
      if (currentChapter === 4 && brandDmg) {
        brandEquity = Math.max(0, brandEquity + brandDmg);
        spawnFloat(player.x, player.y - 50, `${brandDmg} 品牌`, C.red);
        if (brandEquity <= 0) {
          triggerLose('brand');
          return;
        }
      }
      if (player.hp <= 0) {
        triggerLose('hp');
      }
    }

    function triggerLose(reason) {
      state = S.LOSE;
      stateTimer = 0;
      player.loseReason = reason;
      stopBGM();
      playLoseJingle();
      showButtons('lose');
    }

    function onBossDefeated() {
      boss.hp = 0;
      boss.alive = false;
      boss.deathTimer = 0;
      spawnParticles(boss.x, boss.y - 12, C.yellow, 30);
      spawnParticles(boss.x, boss.y - 12, C.cyan, 20);
      shake(12);
      beep(880, 0.4, 'square', 0.06);
      setTimeout(() => beep(1100, 0.4, 'square', 0.06), 100);
    }

    // ============================================================
    //  CH2 战斗
    // ============================================================
    function updateBossCh2() {
      const b = boss;
      if (!b.alive) { b.deathTimer++; return; }
      b.wobble += 0.04;
      b.moveTimer--;
      if (b.moveTimer <= 0) {
        b.targetX = 100 + Math.random() * (W - 200);
        b.moveTimer = 100 + Math.random() * 80;
      }
      b.x += (b.targetX - b.x) * 0.015; // 较慢的游荡
      b.y = b.baseY + Math.sin(b.wobble * 0.7) * 6;
      b.attackTimer--;
      if (b.attackTimer <= 0) {
        fireBossCh2();
        b.attackTimer = 55 + Math.random() * 35; // 加快掉落频率，约 1-1.5 秒一个
      }
      if (b.hitFlash > 0) b.hitFlash--;
    }

    function fireBossCh2() {
      // 主掉落：绿色真话慢，红色陷阱快
      const isTruth = Math.random() < 0.42; // 42% 真话（难度提升）
      const t = isTruth ? pickCh2Truth() : CH2_TRAPS[Math.floor(Math.random() * CH2_TRAPS.length)];
      const wx = 50 + Math.random() * (W - 100);
      const spd = isTruth ? (0.5 + Math.random() * 0.3) : (2.0 + Math.random() * 0.8);
      spawnWord(wx, -30, 0, spd, isTruth ? 'truth' : 'trap', t);
      beep(180, 0.15, isTruth ? 'sine' : 'sawtooth', 0.04);
      // 30% 概率同时再掉一个（加快节奏）
      if (Math.random() < 0.3) {
        const isTruth2 = Math.random() < 0.45;
        const t2 = isTruth2 ? pickCh2Truth() : CH2_TRAPS[Math.floor(Math.random() * CH2_TRAPS.length)];
        const wx2 = 50 + Math.random() * (W - 100);
        const spd2 = isTruth2 ? (0.5 + Math.random() * 0.3) : (2.0 + Math.random() * 0.8);
        spawnWord(wx2, -50, 0, spd2, isTruth2 ? 'truth' : 'trap', t2);
      }
    }

    function updateBossCh4() {
      const b = boss;
      if (!b.alive) { b.deathTimer++; return; }
      b.wobble += 0.04;
      b.moveTimer--;
      if (b.moveTimer <= 0) {
        b.targetX = 50 + Math.random() * (W - 100); // 最终 Boss 游荡范围更大
        b.moveTimer = 60 + Math.random() * 50;
      }
      b.x += (b.targetX - b.x) * 0.03; // 更快的移动
      b.y = b.baseY + Math.sin(b.wobble * 0.6) * 8;
      b.attackTimer--;
      if (b.attackTimer <= 0) {
        fireBossCh4();
        const ratio = b.hp / b.maxHp;
        b.attackTimer = 40 + Math.random() * 30 * ratio; // 更快的攻击频率
      }
      if (b.hitFlash > 0) b.hitFlash--;
    }

    function fireBossCh4() {
      const b = boss;
      const r = Math.random();
      const tx = player.x;
      const ty = player.y - 14;
      if (r < 0.55) {
        const dartTxt = ROI_DARTS[Math.floor(Math.random() * ROI_DARTS.length)];
        fireAimedWord(b.x - 24, b.y - 14, tx, ty, 2.4, 'dart', dartTxt);
      } else if (r < 0.85) {
        const shoutTxt = ROI_SHOUTS[Math.floor(Math.random() * ROI_SHOUTS.length)];
        fireAimedWord(b.x - 24, b.y - 18, tx, ty, 1.1, 'shout', shoutTxt);
      } else {
        for (let i = 0; i < 3; i++) {
          setTimeout(() => {
            if (!boss.alive) return;
            const dartTxt = ROI_DARTS[Math.floor(Math.random() * ROI_DARTS.length)];
            fireAimedWord(boss.x - 24, boss.y - 14, player.x, player.y - 14, 2.2, 'dart', dartTxt);
          }, i * 350);
        }
      }
      beep(180, 0.15, 'sawtooth', 0.04);
    }

    function updateBrandEquity() {
      brandEquity -= BRAND_DECAY;
      if (brandEquity <= 0) {
        brandEquity = 0;
        triggerLose('brand');
      }
    }

    // ============================================================
    //  CH3 战斗：判断真伪
    // ============================================================
    function spawnJudgmentPrompt() {
      const isReal = Math.random() < 0.5;
      const bank = isReal ? TRUTH_PHRASES : FAKE_PHRASES;
      const phrase = bank[Math.floor(Math.random() * bank.length)];
      judgmentPrompt = {
        phrase,
        isReal,
        timer: 0,
        lifetime: 240,  // 4 秒
        answered: false,
        result: null,  // 'correct' | 'wrong' | 'timeout'
      };
      beep(300, 0.1, 'sine', 0.04);
    }

    function updateJudgment() {
      // 没活的就跳冷却
      if (!judgmentPrompt) {
        judgmentCooldown--;
        if (judgmentCooldown <= 0) {
          spawnJudgmentPrompt();
          judgmentCooldown = 999;  // 等当前判断结束
        }
        return;
      }

      // 已经判断过了，等动画播完
      if (judgmentPrompt.answered) {
        judgmentPrompt.timer++;
        if (judgmentPrompt.timer > 60) {
          judgmentPrompt = null;
          judgmentCooldown = 90 + Math.random() * 60;  // 1.5-2.5s 间隔
        }
        return;
      }

      judgmentPrompt.timer++;

      // 接收输入
      let pick = null;
      if (justPressed['1']) pick = true;       // 真洞察
      else if (justPressed['2']) pick = false; // AI 套路

      if (pick !== null) {
        judgmentPrompt.answered = true;
        judgmentPrompt.timer = 0;
        if (pick === judgmentPrompt.isReal) {
          judgmentPrompt.result = 'correct';
          judgmentResults.correct++;
          // 大招命中
          beams.push({
            x: player.x + 6, y: player.y - 16,
            vx: 7, t: judgmentPrompt.isReal ? '✓ 真洞察' : '✗ AI 套路',
            dmg: 30, life: 90,
            color: C.truthBlue,
          });
          beep(900, 0.15, 'square', 0.06);
          setTimeout(() => beep(1200, 0.15, 'square', 0.05), 80);
        } else {
          judgmentPrompt.result = 'wrong';
          judgmentResults.wrong++;
          playerHit(1, 0);
          beep(150, 0.3, 'sawtooth', 0.07);
        }
      } else if (judgmentPrompt.timer >= judgmentPrompt.lifetime) {
        // 超时
        judgmentPrompt.answered = true;
        judgmentPrompt.timer = 0;
        judgmentPrompt.result = 'timeout';
        spawnFloat(W / 2, 80, '× 错过判断', C.dim);
        beep(180, 0.3, 'sawtooth', 0.04);
      }
    }

    function drawJudgmentPrompt() {
      if (!judgmentPrompt) return;
      const jp = judgmentPrompt;

      // 半透明遮罩（不挡下半屏）
      ctx.fillStyle = 'rgba(10, 10, 31, 0.55)';
      ctx.fillRect(0, 30, W, 130);

      if (jp.answered) {
        // 显示结果
        let resultText, resultColor;
        if (jp.result === 'correct') {
          resultText = jp.isReal ? '✓ 这是真洞察' : '✓ 是 AI 套路';
          resultColor = C.green;
        } else if (jp.result === 'wrong') {
          resultText = jp.isReal ? '✗ 这其实是真洞察！' : '✗ 这其实是 AI 套路！';
          resultColor = C.red;
        } else {
          resultText = '× 错过了判断时机';
          resultColor = C.dim;
        }
        text(resultText, W / 2, 90, resultColor, 14, 'center');
        if (jp.result !== 'timeout') {
          text(`「${jp.phrase}」`, W / 2, 115, C.text, 10, 'center');
        }
      } else {
        // 判断 prompt 框
        const cardX = 30, cardY = 42, cardW = W - 60, cardH = 100;
        rect(cardX, cardY, cardW, cardH, C.bgDeep);
        drawBoxBorder(cardX, cardY, cardW, cardH, C.voidGlow);
        drawBoxBorder(cardX - 2, cardY - 2, cardW + 4, cardH + 4, C.glitchPink);

        text('▼ JUDGMENT PROMPT · 真伪判定 ▼', W / 2, cardY + 14, C.glitchPink, 9, 'center');

        // 短语（大字）
        text(`「${jp.phrase}」`, W / 2, cardY + 40, C.white, 13, 'center');
        text('（这句话是真实的消费者洞察，还是 AI 套话？）',
          W / 2, cardY + 56, C.dim, 8, 'center');

        // 选项
        text('[ 1 ] 真 洞 察', cardX + 60, cardY + 80, C.truthBlue, 12);
        text('[ 2 ] A I  套  路', W - cardX - 60, cardY + 80, C.fakeRed, 12, 'right');

        // 倒计时
        const remaining = Math.max(0, jp.lifetime - jp.timer);
        const ratio = remaining / jp.lifetime;
        rect(cardX, cardY + cardH - 4, Math.floor(cardW * ratio), 3,
          ratio > 0.4 ? C.cyan : (ratio > 0.2 ? C.yellow : C.red));
        text(`${Math.ceil(remaining / 60)}s`, W / 2, cardY + cardH - 8, C.dim, 7, 'center');
      }
    }

    function updateBossCh3() {
      const b = boss;
      if (!b.alive) { b.deathTimer++; return; }
      b.wobble += 0.04;
      // boss 固定右侧，不游荡（节奏游戏不需要）
      b.x += (420 - b.x) * 0.05;
      b.y = b.baseY + Math.sin(b.wobble * 0.5) * 5;

      b.attackTimer--;
      if (b.attackTimer <= 0) {
        fireBossCh3();
        const ratio = b.hp / b.maxHp;
        // 节奏感：50-70 帧一个音符（约 0.8-1.2 秒），随 boss 血量降低加速
        b.attackTimer = 35 + Math.floor(Math.random() * 20 * ratio);
      }

      if (b.hitFlash > 0) b.hitFlash--;
    }

    function fireBossCh3() {
      const atk = AI_ATTACKS[Math.floor(Math.random() * AI_ATTACKS.length)];
      const lane = CH3_LANES[atk.slot];
      // 音符加入 ch3Notes（不再用 words 数组，避免 beam y 不匹配 bug）
      ch3Notes.push({
        x: W + 40,
        slot: atk.slot,
        text: atk.t,
        speed: CH3_NOTE_SPEED,
        hit: false,
      });
      // 每个音符发出的轨道提示音，音高随 slot 变化
      beep(330 + atk.slot * 110, 0.06, 'sine', 0.03);
    }

    // CH3 太鼓式节奏游戏 —— 核心逻辑
    function updateCh3Rhythm() {
      // 1) 滚动所有音符
      for (let i = ch3Notes.length - 1; i >= 0; i--) {
        const n = ch3Notes[i];
        n.x += n.speed;
        // 音符飞过判定区左侧没被击中 = Miss
        if (!n.hit && n.x < CH3_HIT_X - CH3_GOOD - 10) {
          n.hit = true; // 标记已处理
          parryMisses++;
          ch3Combo = 0;
          ch3Feedback = { text: 'MISS', color: C.red, timer: 40 };
          // 扣血
          if (player.iframes <= 0) {
            player.hp--;
            player.iframes = 60;
            player.totalHitsTaken++;
            shake(5);
            beep(120, 0.2, 'sawtooth', 0.06);
            spawnFloat(CH3_HIT_X, CH3_TRACK_Y - 30, '-1 头发', C.red);
            if (player.hp <= 0) { triggerLose('hp'); return; }
          }
        }
        // 清理已飞出屏幕的音符
        if (n.x < -60) ch3Notes.splice(i, 1);
      }

      // 2) 处理按键输入
      for (let key = 0; key < 3; key++) {
        if (!justPressed[String(key + 1)]) continue;
        ch3KeyFlashes[key] = 25; // 触发背景闪光

        // 找判定区附近、对应 slot、未被命中的最近音符
        let bestIdx = -1;
        let bestDist = Infinity;
        for (let i = 0; i < ch3Notes.length; i++) {
          const n = ch3Notes[i];
          if (n.hit || n.slot !== key) continue;
          const dist = Math.abs(n.x - CH3_HIT_X);
          if (dist < bestDist && dist <= CH3_GOOD) {
            bestDist = dist;
            bestIdx = i;
          }
        }

        if (bestIdx !== -1) {
          const n = ch3Notes[bestIdx];
          n.hit = true;
          const laneColor = CH3_LANES[n.slot].color;

          if (bestDist <= CH3_PERFECT) {
            // PERFECT
            parryHits++;
            ch3Combo++;
            if (ch3Combo > ch3MaxCombo) ch3MaxCombo = ch3Combo;
            const dmg = 25 + Math.min(ch3Combo, 10); // combo 加成
            boss.hp -= dmg;
            boss.hitFlash = 8;
            shake(5);
            ch3Feedback = { text: `PERFECT! -${dmg}`, color: C.cyanLt, timer: 35 };
            spawnParticles(CH3_HIT_X, CH3_TRACK_Y, laneColor, 18);
            spawnFloat(boss.x, boss.y - 30, `-${dmg}`, laneColor);
            // 太鼓式打击音
            beep(880 + key * 220, 0.08, 'square', 0.08);
            setTimeout(() => beep(1100 + key * 220, 0.06, 'square', 0.05), 50);
          } else {
            // GOOD
            parryHits++;
            ch3Combo++;
            if (ch3Combo > ch3MaxCombo) ch3MaxCombo = ch3Combo;
            const dmg = 15;
            boss.hp -= dmg;
            boss.hitFlash = 4;
            shake(3);
            ch3Feedback = { text: `GOOD -${dmg}`, color: C.yellow, timer: 30 };
            spawnParticles(CH3_HIT_X, CH3_TRACK_Y, C.yellow, 10);
            spawnFloat(boss.x, boss.y - 30, `-${dmg}`, C.yellow);
            beep(660 + key * 110, 0.08, 'square', 0.06);
          }
          // 命中后移除音符
          ch3Notes.splice(bestIdx, 1);
          if (boss.hp <= 0) onBossDefeated();
        } else {
          // 空挥（判定区附近没有对应音符）
          // 不扣分，只给视觉提示，避免惩罚太重
          beep(150, 0.04, 'sawtooth', 0.03);
        }
      }

      // 3) 更新反馈文字计时器
      if (ch3Feedback) {
        ch3Feedback.timer--;
        if (ch3Feedback.timer <= 0) ch3Feedback = null;
      }
      // 4) 递减背景闪光计时器
      for (let i = 0; i < 3; i++) if (ch3KeyFlashes[i] > 0) ch3KeyFlashes[i]--;
    }

    // ============================================================
    //  CH4 v0.8 - 选择题战斗
    // ============================================================
    function spawnCh4Question() {
      if (ch4QIdx >= CH4_TOTAL_Q) return;
      const q = ch4Questions[ch4QIdx];
      const opts = [...q.opts];
      // Fisher-Yates shuffle
      for (let i = opts.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [opts[i], opts[j]] = [opts[j], opts[i]];
      }

      ch4Q = {
        idx: ch4QIdx,
        q: q.q, opts: opts,
        explainB: q.explain,
        picked: null,
        showResult: false,
        resultTimer: 0,
      };
      // 弹题瞬间清掉飞行中的弹幕，避免应答时被打
      words.length = 0;
      beep(520, 0.15, 'sine', 0.06);
    }

    function updateCh4Question() {
      if (!ch4Q) {
        // v1.4: 大招动画进行中 —— 播完才弹题
        if (ch4BossSkill) {
          updateCh4BossSkill();
          return;
        }
        // 题目间冷却时间。BOSS 正常攻击。
        ch4NextQTimer--;
        if (ch4NextQTimer <= 0 && ch4QIdx < CH4_TOTAL_Q) {
          startCh4BossSkill();
        }
        return;
      }

      // 已经选了答案，等结果展示完
      if (ch4Q.showResult) {
        ch4Q.resultTimer++;
        if (ch4Q.resultTimer > 180) {  // 结果展示 3 秒
          ch4QIdx++;
          ch4Q = null;
          ch4NextQTimer = 240; // 4 秒后下一题（如果还有）
          // 全部答完且还有 boss → 把 boss 打到 0
          if (ch4QIdx >= CH4_TOTAL_Q && boss.alive) {
            // 至少答对一题就触发胜利
            const correctCount = ch4Picks.filter(p => p === true).length;
            if (correctCount >= 1) {
              boss.hp = 0;
              onBossDefeated();
            }
          }
        }
        return;
      }

      // 等待玩家按 1/2/3
      let pickIdx = -1;
      if (justPressed['1']) pickIdx = 0;
      else if (justPressed['2']) pickIdx = 1;
      else if (justPressed['3']) pickIdx = 2;
      if (pickIdx === -1) return;

      const pickedOpt = ch4Q.opts[pickIdx];
      const isCorrect = !!pickedOpt.correct;
      ch4Q.pickedCorrect = isCorrect;
      ch4Q.pickedFb = pickedOpt.fb || '';
      ch4Q.showResult = true;
      ch4Q.resultTimer = 0;
      ch4Picks.push(isCorrect);

      // 应用结果
      if (isCorrect) {
        // 答对：boss 大伤 + 品牌+
        boss.hp -= 70;
        boss.hitFlash = 12;
        brandEquity = Math.min(100, brandEquity + 12);
        spawnFloat(boss.x, boss.y - 30, '-70 一针见血', C.cyanLt);
        spawnFloat(player.x, player.y - 40, '+12 品牌', C.brandCyan);
        spawnParticles(boss.x, boss.y - 14, C.cyanLt, 24);
        shake(8);
        beep(990, 0.2, 'square', 0.07);
        setTimeout(() => beep(1320, 0.2, 'square', 0.06), 100);
      } else {
        // 答错：boss 小伤 + 品牌-
        boss.hp -= 20;
        boss.hitFlash = 6;
        brandEquity = Math.max(0, brandEquity - 16);
        spawnFloat(boss.x, boss.y - 30, '-20', C.yellow);
        spawnFloat(player.x, player.y - 40, '-16 品牌', C.red);
        shake(5);
        beep(220, 0.18, 'sawtooth', 0.06);
        if (brandEquity <= 0) { triggerLose('brand'); return; }
      }
      if (boss.hp <= 0 && boss.alive) onBossDefeated();
    }

    // ============================================================
    //  v1.4: CH4 出题前的暴君"大招"动画（3 种随机）
    // ============================================================
    function startCh4BossSkill() {
      ch4BossSkill = {
        type: Math.floor(Math.random() * 2),  // 0=砸盘  1=焦虑风暴
        t: 0,
        targetX: player.x,                    // 砸盘落点 = 玩家当前位置
        bossX0: boss.x,
      };
      words.length = 0; // 清掉飞行弹幕
      beep(140, 0.2, 'sawtooth', 0.06);
    }

    function updateCh4BossSkill() {
      const sk = ch4BossSkill;
      const b = boss;
      sk.t++;
      b.wobble += 0.04;
      if (b.hitFlash > 0) b.hitFlash--;

      if (sk.type === 0) {
        // ===== 砸盘：变大 + 跳到玩家头顶 + 砸下（不掉血）=====
        if (sk.t < 40) {
          const p = sk.t / 40;
          b.fxScale = 1 + 0.7 * p;                          // 1 → 1.7 变大
          b.y = b.baseY - 92 * Math.sin(p * Math.PI / 2);   // 升空
          b.x = sk.bossX0 + (sk.targetX - sk.bossX0) * p;   // 横移到玩家上方
        } else if (sk.t < 54) {
          const p = (sk.t - 40) / 14;
          b.fxScale = 1.7;
          b.x = sk.targetX;
          b.y = (b.baseY - 92) + 92 * (p * p);              // 加速砸下
        } else {
          b.x = sk.targetX;
          b.y = b.baseY;
          if (sk.t === 54) {
            // 砸地冲击（不掉血，纯演出）
            shake(20);
            for (let i = 0; i < 32; i++) {
              spawnParticles(sk.targetX - 56 + i * 3.5, GROUND_Y, C.dollarGold, 1);
            }
            spawnFloat(sk.targetX, GROUND_Y - 44, '砰！', C.red);
            beep(65, 0.36, 'sawtooth', 0.1);
          }
          if (sk.t > 78) {  // 收尾缩回正常大小
            const p = Math.min(1, (sk.t - 78) / 38);
            b.fxScale = 1.7 - 0.7 * p;
          }
        }
      } else {
        // ===== 焦虑风暴：旋转成龙卷风 + 螺旋旋出粒子 =====
        b.y = b.baseY - 12 - Math.sin(sk.t * 0.12) * 5;     // 微微浮起
        b.fxSpinScale = 0.32 + 0.68 * Math.abs(Math.cos(sk.t * 0.42)); // 旋转挤压
        b.fxScale = 1 + 0.12 * Math.sin(sk.t * 0.22);       // 轻微脉动
        if (sk.t % 3 === 0) {
          const ang = sk.t * 0.5;
          const r = 12 + (sk.t % 38);
          spawnParticles(b.x + Math.cos(ang) * r, b.baseY - 26 + Math.sin(ang) * r * 0.45,
            Math.random() < 0.5 ? C.dollarGold : C.red, 2);
        }
        if (sk.t === 36) shake(6);
        if (sk.t === 78) shake(9);
        if (sk.t % 22 === 0) beep(170 + (sk.t % 90), 0.09, 'sawtooth', 0.05);
      }

      if (sk.t >= 120) {
        b.fxScale = 1;
        b.fxSpinScale = 1;
        b.y = b.baseY;
        ch4BossSkill = null;
        spawnCh4Question();
      }
    }

    function drawCh4BossSkill() {
      if (!ch4BossSkill) return;
      const sk = ch4BossSkill;
      const b = boss;

      // 焦虑风暴：在 boss 处叠一个半透明龙卷风漏斗
      if (sk.type === 1) {
        const cx = px(b.x);
        ctx.globalAlpha = 0.28;
        for (let i = 0; i < 7; i++) {
          const w = 5 + i * 4.5;
          const yy = GROUND_Y - i * 8;
          const sway = Math.sin(sk.t * 0.3 + i * 0.6) * 5;
          rect(cx - w / 2 + sway, yy - 7, w, 8, i % 2 ? C.dollarGold : '#7a5a22');
        }
        ctx.globalAlpha = 1;
      }

      // 招式横幅
      const names = ['砸  ·  盘', '增 长 焦 虑 风 暴'];
      const appear = Math.min(1, sk.t / 14);
      const fade = sk.t > 100 ? Math.max(0, 1 - (sk.t - 100) / 20) : 1;
      ctx.globalAlpha = appear * fade;
      rect(0, 64, W, 32, 'rgba(20, 10, 4, 0.86)');
      rect(0, 64, W, 2, C.dollarGold);
      rect(0, 94, W, 2, C.dollarGold);
      text('◆  ROI 暴君 · 发动大招  ◆', W / 2, 76, C.red, 8, 'center');
      text(names[sk.type], W / 2, 90, C.dollarGold, 13, 'center');
      ctx.globalAlpha = 1;
    }

    // ============================================================
    function updateFight() {
      // v1.4: Ch2 互动教学 —— 在真实游戏里分步引导（不冻结场景，但 boss 不自动喷洞察/陷阱）
      if (currentChapter === 2 && ch2Tutorial.active) {
        updatePlayer();
        updateWords();
        // 注：Ch2 不能给 iframes（否则真洞察的"碰到 = 接住"逻辑也会被屏蔽）
        if (stateTimer > 60) {
          // 各步骤的"剧本式"实体投放
          if (ch2Tutorial.step === 0 && ch2Tutorial.spawnedAtStep !== 0) {
            // 在 player 上方落下一颗慢速真洞察
            spawnWord(player.x, -30, 0, 0.45, 'truth', '消费者其实不知道自己要什么');
            ch2Tutorial.spawnedAtStep = 0;
          }
          if (ch2Tutorial.step === 1 && ch2Tutorial.spawnedAtStep !== 1) {
            // 落下一颗慢速陷阱
            spawnWord(player.x + 60, -30, 0, 1.1, 'trap', '"颗粒度更高"');
            ch2Tutorial.spawnedAtStep = 1;
          }
          // 进度推进：检测 words 数组里对应类型的词条是否消失（被接到 或 落出屏幕）
          const hasTruth = words.some(w => w.type === 'truth');
          const hasTrap = words.some(w => w.type === 'trap');
          if (ch2Tutorial.step === 0 && ch2Tutorial.spawnedAtStep === 0 && !hasTruth) {
            ch2Tutorial.step = 1;
          } else if (ch2Tutorial.step === 1 && ch2Tutorial.spawnedAtStep === 1 && !hasTrap) {
            ch2Tutorial.step = 2;
            ch2Tutorial.fadeOut = 90;
          } else if (ch2Tutorial.step === 2) {
            ch2Tutorial.fadeOut--;
            if (ch2Tutorial.fadeOut <= 0) {
              ch2Tutorial.active = false;
              ch2Tutorial.doneOnce = true;
              player.iframes = 0;
            }
          }
        }
        // 也跑 boss 的 wobble/move 动画但不让它发射
        const b = boss;
        if (b.alive) {
          b.wobble = (b.wobble || 0) + 0.04;
          b.y = b.baseY + Math.sin(b.wobble * 0.7) * 4;
        }
        updateBeams();
        updateParticles();
        return;
      }
      // v1.4: Ch3 互动教学 —— 三种颜色音符各放一颗慢速练习
      if (currentChapter === 3 && ch3Tutorial.active) {
        updatePlayer();
        updateCh3Rhythm();
        // 教学期间玩家无敌
        player.iframes = Math.max(player.iframes, 3);
        if (stateTimer > 60) {
          // v1.4: 只做 2 步（不再 123 都测）。第 0 步发蓝色(1)，第 1 步发粉色(2)。
          if (ch3Tutorial.step < 2 && ch3Tutorial.spawnedAtStep !== ch3Tutorial.step) {
            ch3Notes.push({
              x: W + 40,
              slot: ch3Tutorial.step,
              text: '套话',
              speed: -2.8, // 教学速度（正式为 -3.5，只略慢一点点）
              hit: false,
            });
            ch3Tutorial.spawnedAtStep = ch3Tutorial.step;
            beep(330 + ch3Tutorial.step * 110, 0.06, 'sine', 0.03);
          }
          // 检测当前音符是否离开（被击中或飞过）
          if (ch3Tutorial.spawnedAtStep === ch3Tutorial.step && ch3Notes.length === 0) {
            ch3Tutorial.step++;
            if (ch3Tutorial.step >= 2) {
              ch3Tutorial.fadeOut = 90;
            }
          }
          if (ch3Tutorial.step >= 2) {
            ch3Tutorial.fadeOut--;
            if (ch3Tutorial.fadeOut <= 0) {
              ch3Tutorial.active = false;
              ch3Tutorial.doneOnce = true;
              player.iframes = 0;
            }
          }
        }
        updateBeams();
        updateParticles();
        return;
      }
      // v1.4: Ch1 互动教学 —— 冻结 boss/词条，监听玩家"跳"和"反问"
      if (currentChapter === 1 && ch1Tutorial.active) {
        updatePlayer();
        updateRetorts();
        updateBeams();
        updateParticles();
        // 等 READY splash 结束后再监听玩家输入（避免误推进）
        if (stateTimer > 60) {
          if (ch1Tutorial.step === 0) {
            if (justPressed['arrowup'] || justPressed['w']) {
              ch1Tutorial.step = 1;
            }
          } else if (ch1Tutorial.step === 1) {
            if (justPressed[' ']) {
              ch1Tutorial.step = 2;
              ch1Tutorial.fadeOut = 60;
            }
          } else if (ch1Tutorial.step === 2) {

            if (ch1Tutorial.fadeOut <= 0) {
              ch1Tutorial.active = false;
              ch1Tutorial.doneOnce = true;
            }
          }
        }
        return;
      }

      updatePlayer();
      if (currentChapter === 1) {
        updateBossCh1();
        updateWords();
        updateRetorts();
      } else if (currentChapter === 2) {
        updateBossCh2();
        updateWords();

      }

      updateParticles();

    // CH3 太鼓式节奏游戏 —— 视觉渲染
    function drawCh3Rhythm() {
      const ty = CH3_TRACK_Y;
      const hx = CH3_HIT_X;

      // 1) 横向轨道线
      rect(0, ty - 1, W, 3, 'rgba(124, 58, 237, 0.3)');
      // 细网格刻度
      for (let x = hx; x < W; x += 40) {
        rect(x, ty - 12, 1, 25, 'rgba(124, 58, 237, 0.15)');
      }

      // 2) 判定圈（脉冲动画）
      const pulse = 1 + Math.sin(stateTimer * 0.2) * 0.15;
      const r = 16 * pulse;
      ctx.strokeStyle = C.cyanLt;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(hx, ty, r, 0, Math.PI * 2);
      ctx.stroke();
      // 内圈
      ctx.strokeStyle = 'rgba(167, 243, 255, 0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(hx, ty, r + 6, 0, Math.PI * 2);
      ctx.stroke();
      // Perfect 区域指示线
      ctx.fillStyle = 'rgba(167, 243, 255, 0.08)';
      ctx.fillRect(hx - CH3_PERFECT, ty - 18, CH3_PERFECT * 2, 36);

      // 3) 底部按键提示
      for (let i = 0; i < 3; i++) {
        const lane = CH3_LANES[i];
        const bx = hx - 30 + i * 30;
        rect(bx - 10, ty + 28, 20, 16, C.bgDeep);
        drawBoxBorder(bx - 10, ty + 28, 20, 16, lane.color);
        text(lane.key, bx, ty + 40, lane.color, 11, 'center');
      }
      text('逻辑', hx - 30, ty + 52, CH3_LANES[0].color, 6, 'center');
      text('情感', hx,      ty + 52, CH3_LANES[1].color, 6, 'center');
      text('直觉', hx + 30, ty + 52, CH3_LANES[2].color, 6, 'center');

      // 4) 绘制音符（彩色圆形 + 数字标签）
      for (const n of ch3Notes) {
        if (n.hit) continue;
        const lane = CH3_LANES[n.slot];
        const dist = Math.abs(n.x - hx);
        const inPerfect = dist <= CH3_PERFECT;
        const inGood = dist <= CH3_GOOD;
        const noteR = inPerfect ? 14 : (inGood ? 12 : 10);

        // 音符外圈
        ctx.fillStyle = lane.color;
        ctx.beginPath();
        ctx.arc(n.x, ty, noteR, 0, Math.PI * 2);
        ctx.fill();
        // 音符内圈
        ctx.fillStyle = C.bgDeep;
        ctx.beginPath();
        ctx.arc(n.x, ty, noteR - 3, 0, Math.PI * 2);
        ctx.fill();
        // 数字标签
        text(lane.key, n.x, ty + 4, lane.color, 12, 'center');

        // 靠近判定区时高亮闪烁
        if (inGood && stateTimer % 8 < 4) {
          ctx.strokeStyle = inPerfect ? C.white : lane.color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(n.x, ty, noteR + 3, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    function triggerWin() {
      state = S.WIN;
      stateTimer = 0;
      const chIdx = currentChapter - 1;

      if (!chaptersWon[chIdx]) {
        chaptersWon[chIdx] = true;
        const reward = CHAPTER_REWARDS[currentChapter];
        for (const k in reward) stats[k] += reward[k];
      }

      stopBGM();
      playVictoryJingle();

      // v0.8: 通关 CH4 = 终极胜利
      if (currentChapter === 4) {
        setTimeout(() => {
          if (state === S.WIN) {
            state = S.FINALE;
            stateTimer = 0;
            finaleSkipped = false;
            showButtons('finale');
            startBGM('finale');
          }
        }, 5000);
      }
      showButtons('win');
    }

      } else {
        // === 字幕滚动中 ===
        // 3D 透视变换
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, headerEndY + 4, W, H - headerEndY - 4);
        ctx.clip();

        const perspCenter = headerEndY + 30;
        for (let i = 0; i < crawlLines.length; i++) {
          const line = crawlLines[i];
          if (!line.t) continue;
          const rawY = crawlStartY + i * lineH - crawlOffset;

          const viewH = H - perspCenter;
          const normY = (rawY - perspCenter) / viewH;
          if (normY < -0.05 || normY > 1.15) continue;

          const scale = 0.3 + normY * 0.7;
          const alpha = Math.min(1, Math.max(0, normY * 1.8));

          const screenY = perspCenter + normY * viewH;
          const fontSize = Math.max(4, Math.floor(line.s * scale * 1.4));

          ctx.globalAlpha = alpha;
          text(line.t, W / 2, screenY, line.c, fontSize, 'center');
        }
        ctx.globalAlpha = 1;
        ctx.restore();

        // 顶部渐隐遮罩
        const fadeG = ctx.createLinearGradient(0, headerEndY, 0, headerEndY + 50);
        fadeG.addColorStop(0, '#000');
        fadeG.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = fadeG;
        ctx.fillRect(0, headerEndY, W, 50);

        // 底部分隔线
        rect(0, headerEndY + 2, W, 1, C.gold);

        // 跳过提示（更清晰：白色 + 更大字号）
        if (stateTimer > 60) {
          text('▼ 按 ENTER 跳过字幕 ▼', W / 2, H - 12, C.text, 9, 'center');
        }
      }
    }


    // ============================================================
    //  分享 + 按钮
    // ============================================================
    const winButtons = document.getElementById('winButtons');
    const loseButtons = document.getElementById('loseButtons');
    const finaleButtons = document.getElementById('finaleButtons');
    const btnNext = document.getElementById('btnNext');
    const btnRestart = document.getElementById('btnRestart');
    const btnLoseRestart = document.getElementById('btnLoseRestart');
    const btnLoseSelect = document.getElementById('btnLoseSelect');
    const btnFinaleRestart = document.getElementById('btnFinaleRestart');
    const shareToast = document.getElementById('shareToast');
    const backBtn = document.getElementById('backBtn');

    function showButtons(which) {
      hideButtons();
      if (which === 'win') winButtons.classList.add('show');
      else if (which === 'lose') loseButtons.classList.add('show');
      else if (which === 'finale') {
        winButtons.classList.remove('show');
        finaleButtons.classList.add('show');
      }
    }
    function hideButtons() {
      winButtons.classList.remove('show');
      loseButtons.classList.remove('show');
      finaleButtons.classList.remove('show');
    }
    function showToast(msg, color = '#38b6db') {
      shareToast.textContent = msg;
      shareToast.style.background = color;
      shareToast.style.display = 'block';
      shareToast.style.animation = 'none';
      void shareToast.offsetWidth;
      shareToast.style.animation = 'toastIn 0.25s ease, toastOut 0.4s ease 2.6s forwards';
      setTimeout(() => { shareToast.style.display = 'none'; }, 3100);
    }

    async function shareWin() {
      const info = CHAPTER_INFO[currentChapter];
      const txt =
        `我在《品牌策略人启示录》第 ${currentChapter} 章击溃了「${info.name}」。\n\n` +
        `我看穿了「${info.insightTitle}」——\n${info.insightBody}\n\n` +
        `${info.closer}\n\n` +
        `#策略人启示录`;
      await doShare(txt);
    }

    async function shareFinale() {
      const txt =
        `我通关了《品牌策略人启示录》四章完整版。\n` +
        `模糊 Brief → 虚假洞察 → AI 魔王 → ROI 暴君，全通了！\n\n` +
        `「世界变化很快，策略人始终成长。」\n\n` +
        `四大技能：反问之刃 · 清醒之眼 · 实践真知 · 平衡之道\n\n` +
        `#策略人启示录 · 实战派策略大师`;
      await doShare(txt);
    }

    async function doShare(txt) {
      if (navigator.share) {
        try {
          await navigator.share({ title: '品牌策略人启示录', text: txt });
          showToast('✓ 已发送到分享菜单');
          return;
        } catch (e) {
          if (e.name === 'AbortError') return;
        }
      }
      try {
        await navigator.clipboard.writeText(txt);
        showToast('✓ 战绩文案已复制 · 去贴朋友圈吧');
      } catch (e) {
        showToast('请手动复制：' + txt.slice(0, 30) + '…', '#ff6464');
      }
    }

    function goToNextChapter() {
      hideButtons();
      if (currentChapter < 4) {
        currentChapter++;
        resetCombatEntities();
        state = S.INTRO;
        stateTimer = 0;
        startBGM('ch' + currentChapter);
      } else {
        state = S.FINALE;
        stateTimer = 0;
        showButtons('finale');
        startBGM('finale');
      }
    }

    document.getElementById('btnContact').addEventListener('click', () => {
      document.getElementById('qrOverlay').style.display = 'flex';
    });
    document.getElementById('btnCloseQR').addEventListener('click', () => {
      document.getElementById('qrOverlay').style.display = 'none';
    });
    document.getElementById('qrOverlay').addEventListener('click', (e) => {
      if(e.target.id === 'qrOverlay') {
        document.getElementById('qrOverlay').style.display = 'none';
      }
    });



    // v1.4: 所有覆盖层按钮点击后立即失焦，避免 ENTER 误触发
    btnNext.addEventListener('click', (e) => { goToNextChapter(); e.currentTarget.blur(); });
    btnRestart.addEventListener('click', (e) => {
      hideButtons();
      resetCombatEntities();
      state = S.INTRO;
      stateTimer = 0;
      e.currentTarget.blur();
    });
    btnLoseRestart.addEventListener('click', (e) => {
      hideButtons();
      resetCombatEntities();
      state = S.INTRO;
      stateTimer = 0;
      startBGM('ch' + currentChapter);
      e.currentTarget.blur();
    });
    btnLoseSelect.addEventListener('click', (e) => {
      // v0.8: 取消选关 → 返回标题
      hideButtons();
      reset();
      e.currentTarget.blur();
    });
    btnFinaleRestart.addEventListener('click', () => location.reload());
    backBtn.addEventListener('click', () => {
      // v0.8: 取消选关 → 返回标题（重新走流程）
      hideButtons();
      reset();
    });

    // ============================================================
    //  重置
    // ============================================================
    function resetCombatEntities() {
      player.x = 80; player.y = GROUND_Y;
      player.vx = 0; player.vy = 0;
      player.hp = player.maxHp;
      player.iframes = 0;
      player.totalHitsTaken = 0;
      player.loseReason = null;

      boss.x = 400; boss.targetX = 380;
      // v0.7 难度调到 6.5：CH3 350→200, CH4 600→320
      if (currentChapter === 1) boss.maxHp = 200;
      else if (currentChapter === 2) boss.maxHp = 100;
      else if (currentChapter === 3) boss.maxHp = 200;
      else if (currentChapter === 4) boss.maxHp = 320;
      boss.hp = boss.maxHp;
      boss.alive = true;
      boss.deathTimer = 0;
      boss.attackTimer = 100;
      boss.moveTimer = 100;
      boss.hitFlash = 0;

      words.length = 0;
      beams.length = 0;
      particles.length = 0;
      floats.length = 0;
      retortSlots = [null, null, null];
      retortCD = [0, 0, 0];

      brandEquity = 60;
      ch2Progress = 0;
      // CH3 节奏游戏状态
      ch3Notes.length = 0;
      ch3Combo = 0;
      ch3MaxCombo = 0;
      ch3Feedback = null;
      parryHits = 0;
      parryMisses = 0;
      ch3KeyFlashes = [0, 0, 0];
      // CH4 选择题状态
      ch4Q = null;
      ch4QIdx = 0;
      ch4NextQTimer = 240;
      ch4Picks = [];
      ch4BossSkill = null;
      boss.fxScale = 1;
      boss.fxSpinScale = 1;
      // v1.4: 从 6 题题库随机抽 3 题（Fisher-Yates）
      ch4Questions = [...CH4_QUESTION_POOL];
      for (let i = ch4Questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [ch4Questions[i], ch4Questions[j]] = [ch4Questions[j], ch4Questions[i]];
      }
      ch4Questions = ch4Questions.slice(0, CH4_TOTAL_Q);
      // 死代码（保留以免引用报错）
      judgmentPrompt = null;
      judgmentCooldown = 90;
      judgmentResults = { correct: 0, wrong: 0 };
    }

    function reset() {
      resetCombatEntities();
      stats = { ...INITIAL_STATS };
      chaptersWon = [false, false, false, false];
      prologueShown = false;
      prologuePage = 0;
      ch1Tutorial = { active: false, step: 0, fadeOut: 0, doneOnce: false };
      ch2Tutorial = { active: false, step: 0, spawnedAtStep: -1, fadeOut: 0, doneOnce: false };
      ch3Tutorial = { active: false, step: 0, spawnedAtStep: -1, fadeOut: 0, doneOnce: false };
      hideButtons();
      state = S.TITLE;
      stateTimer = 0;
      if (bgmStarted) startBGM('title');
    }

    // ============================================================
    //  主循环
    // ============================================================
    function loop() {
      ctx.fillStyle = C.bgDeep;
      ctx.fillRect(0, 0, W, H);

      // 全局：根据状态切 BGM
      if (state === S.TITLE || state === S.PROLOGUE || state === S.CHAPTER_SELECT) {
        if (bgmStarted && bgmCurrentId !== 'title') startBGM('title');
      }

      // 显示返回按钮
      const showBack = (state === S.INTRO || state === S.READY || state === S.FIGHT) && !boss.deathTimer;
      backBtn.style.display = showBack ? 'block' : 'none';
      pauseBtn.style.display = (state === S.FIGHT && boss.alive) ? 'block' : 'none';
      if (state !== S.FIGHT) { paused = false; pauseBtn.textContent = '⏸ 按 P 暂停'; pauseBtn.style.color = '#ffec27'; pauseBtn.style.borderColor = '#ffec27'; }

      let shaking = false;
      if (shakeAmt > 0) {
        shaking = true;
        const sx = (Math.random() - 0.5) * shakeAmt;
        const sy = (Math.random() - 0.5) * shakeAmt;
        ctx.save();
        ctx.translate(px(sx), px(sy));
        shakeAmt *= 0.85;
        if (shakeAmt < 0.5) shakeAmt = 0;
      }

      if (state === S.TITLE) drawTitle();
      else if (state === S.PROLOGUE) drawPrologue();
      else if (state === S.CHAPTER_SELECT) drawChapterSelect();
      else if (state === S.INTRO) drawIntro();
      else if (state === S.READY) { stateTimer++; drawReady(); }
      else if (state === S.FIGHT) {
        if (!paused) updateFight();
        drawFight();
        if (paused) {
          ctx.fillStyle = 'rgba(5,8,16,0.72)';
          ctx.fillRect(0, 0, W, H);
          text('⏸  暂  停', W / 2, H / 2 - 14, C.yellow, 20, 'center');
          text('按 P / ESC 或点击「继续」恢复', W / 2, H / 2 + 10, C.dim, 9, 'center');
        }
      }
      else if (state === S.WIN) drawWin();
      else if (state === S.LOSE) drawLose();
      else if (state === S.FINALE) drawFinale();
      else if (state === S.ULTIMATE_REVEAL) drawUltimateReveal();

      if (shaking) ctx.restore();

      stateTimer++;
      for (const k in justPressed) delete justPressed[k];
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
